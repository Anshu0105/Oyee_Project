<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYEEE - Admin Moderation Console</title>
    <!-- Include the moderation styling imported from the Admin branch -->
    <link rel="stylesheet" href="oyee-moderation-styles.css">
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #0d0f12; /* Dark theme */
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .admin-dashboard {
            background: #1a1e26;
            border-radius: 12px;
            border: 1px solid #2d3748;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            overflow: hidden;
            height: 90vh; /* Fill the screen */
        }

        .dashboard-header {
            background: #2d3748;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e53e3e; /* Accent red */
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 1.25rem;
            color: #fff;
            position: relative;
        }

        .chat-room-name {
            font-size: 0.9rem;
            color: #a0aec0;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Mock Chat Container - Required by oyee-moderation-ui.js */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            background: #111419;
            padding: 20px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        /* Default message styling (before moderation interception) */
        .msg-wrap {
            background: #2d3748;
            padding: 12px 16px;
            border-radius: 8px;
            align-self: flex-start;
            max-width: 80%;
            word-wrap: break-word;
            border-left: 3px solid #718096;
        }
        .msg-wrap.own {
            align-self: flex-end;
            background: #2b6cb0;
            border-left: none;
            border-right: 3px solid #4299e1;
        }

        .msg-hdr {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: #a0aec0;
        }
        .msg-name { font-weight: bold; color: #cbd5e0; }

        /* The Input Area required by the JS */
        .chat-input-wrap {
            display: flex;
            gap: 10px;
            margin-top: auto; /* Push to bottom */
            background: #1a1e26;
            padding: 15px;
            border-top: 1px solid #2d3748;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: #2d3748;
            border: 1px solid #4a5568;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: #63b3ed;
        }

        .send-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #c53030;
        }
        
    </style>
</head>
<body>

    <div class="admin-dashboard">
        <div class="dashboard-header">
            <h1>🛡️ Moderation Console Simulator</h1>
            <span class="chat-room-name">ADMIN_TEST_ENV</span>
        </div>

        <div class="chat-container">
            <div class="chat-messages">
                <div class="msg-wrap">
                    <div class="msg-hdr">
                        <span class="msg-name">System</span>
                        <span class="msg-time">Now</span>
                    </div>
                    <div class="msg-bubble">Admin Moderation active. Test typing sensitive information like phone numbers or explicit language below to trigger the interception UI.</div>
                </div>
            </div>

            <!-- Warning/Notice target area -->
            
            <div class="chat-input-wrap">
                <input type="text" class="chat-input" placeholder="Type a message to test content detection..." autocomplete="off">
                <button class="send-btn">Test Send</button>
            </div>
        </div>
    </div>

    <!-- Core Scripts Imported from Anshuman Branch -->
    <script src="content-detector.js"></script>
    <script src="detector-integration.js"></script>
    <script src="oyee-moderation-ui.js"></script>

    <!-- Console Logging Instructions for the User -->
    <script>
        console.log("=========================================");
        console.log("🛡️ ADMIN MODERATION CONSOLE LOADED");
        console.log("Global functions available for testing:");
        console.log("- window.OyeeModeration.analyzeText('string')");
        console.log("- window.OyeeModeration.getStats()");
        console.log("- window.OyeeModeration.scanHistory()");
        console.log("=========================================");
    </script>
</body>
</html>
